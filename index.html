<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Salon Pudra - CRM & Backup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <style>
        :root { --pudra-pink: #fce4ec; --pudra-dark: #d81b60; --pudra-soft: #f8bbd0; --cash: #43a047; --card: #1e88e5; }
        * { box-sizing: border-box; }
        body, input, select, textarea, button { font-family: 'Montserrat', sans-serif; }
        body { background: #fffafa; background-image: radial-gradient(#fce4ec 1px, transparent 1px); background-size: 20px 20px; margin: 0; padding: 0; color: #444; }
        h1, h2, h3, .cat-title, .header-cell b { font-family: 'Playfair Display', serif; letter-spacing: 0.5px; }
        nav { background: white; padding: 12px; display: flex; gap: 10px; border-bottom: 3px solid var(--pudra-pink); position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
        nav button { padding: 10px 20px; border-radius: 20px; border: 2px solid var(--pudra-pink); background: white; cursor: pointer; white-space: nowrap; font-weight: 600; color: #555; transition: 0.3s; }
        nav button.active { background: var(--pudra-pink); color: var(--pudra-dark); border-color: var(--pudra-soft); }
        .container { padding: 15px; max-width: 1400px; margin: auto; }
        .hidden { display: none !important; }
        .card { background: white; padding: 25px; border-radius: 25px; margin-bottom: 20px; border: 1px solid #fce4ec; box-shadow: 0 5px 15px rgba(0,0,0,0.04); }
        .schedule-wrap { background: white; border-radius: 20px; overflow: auto; max-height: 80vh; border: 1px solid #eee; box-shadow: 0 10px 20px rgba(0,0,0,0.03); }
        .grid { display: grid; background: #fef0f3; gap: 1px; min-width: 900px; }
        .grid-cell { background: white; min-height: 100px; position: relative; }
        .header-cell { background: #fff0f3; position: sticky; top: 0; z-index: 100; height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; border-bottom: 2px solid var(--pudra-pink); }
        .header-cell b { color: var(--pudra-dark); font-size: 16px; }
        .header-cell small { font-size: 10px; color: #888; font-weight: 500; margin-top: 3px; }
        .time-cell { background: #fafafa; font-weight: 600; position: sticky; left: 0; z-index: 90; width: 65px; display: flex; align-items: center; justify-content: center; color: var(--pudra-dark); }
        .slot { height: 50px; border-bottom: 1px solid #fff5f7; }
        .booked { background: #fff9fa; border-left: 5px solid var(--pudra-soft); border-radius: 8px; width: 96%; height: 92%; position: absolute; left: 2%; top: 4%; z-index: 10; display: flex; flex-direction: column; padding: 6px; font-size: 11px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .booked.paid { border-left-color: var(--cash); background: #f1f8e9; }
        .del-x { color: #f44336; border: none; background: none; position: absolute; top: 2px; right: 2px; cursor: pointer; font-size: 18px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #fce4ec; border-radius: 15px; font-size: 15px; background: #fffcfd; font-weight: 500;}
        .btn-main { background: var(--pudra-dark); color: white; border: none; padding: 18px; border-radius: 15px; width: 100%; cursor: pointer; font-weight: 600; font-size: 16px; transition: 0.3s; }
        .checkbox-group { max-height: 250px; overflow-y: auto; border: 1px solid #fce4ec; border-radius: 15px; padding: 15px; background: #fffcfd; margin: 10px 0; }
        .cat-title { font-weight: bold; color: var(--pudra-dark); margin-top: 10px; margin-bottom: 5px; border-bottom: 1px solid #fce4ec; padding-bottom: 3px; font-size: 16px; }
        .srv-label { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; font-size: 14px; cursor: pointer; }
        .history-box { margin-top: 20px; padding: 15px; background: #fafafa; border-radius: 15px; border: 1px dashed var(--pudra-soft); }
        .history-item { background: white; padding: 10px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--pudra-pink); font-size: 13px; }
        .stat-box { display: flex; justify-content: space-between; padding: 15px; background: #fffcfd; border-radius: 15px; margin-bottom: 10px; border: 1px solid #fce4ec; align-items: center;}
        .stat-val { font-weight: 700; color: var(--pudra-dark); font-size: 18px; }
        .master-salary-row { display: flex; justify-content: space-between; padding: 10px 15px; border-bottom: 1px dashed #fce4ec; font-size: 15px; }
        #paymentModal { position: fixed; inset: 0; background: rgba(216, 27, 96, 0.2); backdrop-filter: blur(5px); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .modal-card { background: white; padding: 35px; border-radius: 30px; width: 90%; max-width: 350px; text-align: center; border: 4px solid var(--pudra-pink); }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card" style="padding: 40px; text-align: center; background: white; border-radius: 30px; border: 3px solid var(--pudra-pink); max-width: 400px; margin: auto; position: relative; top: 20%;">
        <h1 style="color: var(--pudra-dark); font-size: 42px; font-style: italic;">Pudra</h1>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPass" placeholder="Пароль">
        <button class="btn-main" onclick="handleLogin()">Увійти</button>
        <button class="btn-main" style="background:#fce4ec; color: var(--pudra-dark); margin-top:10px;" onclick="bypassLogin()">Вхід для Майстрів</button>
    </div>
</div>

<div id="paymentModal">
    <div class="modal-card">
        <h3>Оплата візиту</h3>
        <p id="paymentInfo" style="font-weight: 700; font-size: 22px; color: var(--pudra-dark);"></p>
        <button class="btn-main" style="background:var(--cash); margin-bottom:12px;" onclick="confirmPayment('Готівка')">💵 Готівка</button>
        <button class="btn-main" style="background:var(--card); margin-bottom:20px;" onclick="confirmPayment('Картка')">💳 Картка</button>
        <button onclick="document.getElementById('paymentModal').style.display='none'" style="background:none; border:none; color:#aaa; cursor:pointer;">Скасувати</button>
    </div>
</div>

<div id="mainApp" class="hidden">
    <nav>
        <button id="btn-cal" class="active" onclick="showSection('cal')">🗓 Розклад</button>
        <button id="btn-add" onclick="showSection('add')">➕ Запис</button>
        <button id="btn-boss" class="admin-only hidden" onclick="showSection('boss')">📈 Звіти</button>
        <button id="btn-staff" class="admin-only hidden" onclick="showSection('staff')">👥 Майстри</button>
        <button id="btn-price" class="admin-only hidden" onclick="showSection('price')">💰 Прайс</button>
        <button onclick="handleLogout()" style="margin-left:auto; border:none; background:none; font-size:24px;">🌸</button>
    </nav>

    <div class="container">
        <div id="section-cal" class="section">
            <div style="text-align:center; padding:15px;"><input type="date" id="viewDateSelector" onchange="renderGrid()" style="width:auto; border-radius:30px; padding:10px 25px; font-weight: 600;"></div>
            <div class="schedule-wrap"><div class="grid" id="mainGrid"></div></div>
        </div>

        <div id="section-add" class="section hidden">
            <div class="card">
                <h3>Створити запис</h3>
                <div style="display:flex; gap:10px;"><input type="date" id="appDate"><input type="time" id="appTime" step="1800" value="09:00"></div>
                <input type="text" id="clientName" placeholder="Ім'я клієнта">
                <input type="tel" id="clientPhone" placeholder="Номер телефону" oninput="searchClientHistory()">
                <div id="serviceCheckboxes" class="checkbox-group"></div>
                <textarea id="appMaterials" placeholder="Нотатки та матеріали..."></textarea>
                <select id="selectMaster" onchange="recalcSalaryManual()"></select>
                <div style="display:flex; gap:10px;"><input type="number" id="appDuration" placeholder="Хв"><input type="number" id="appPrice" placeholder="грн" oninput="recalcSalaryManual()"></div>
                <input type="number" id="appMasterSalary" placeholder="ЗП майстра" style="background:#fff0f3; border-color:var(--pudra-soft); font-weight: 700;">
                <button class="btn-main" onclick="addAppointment()">Зберегти</button>
                <div id="clientHistoryContainer"></div>
            </div>
        </div>

        <div id="section-boss" class="section hidden">
            <div class="card">
                <h3>Фінансові підсумки</h3>
                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <input type="date" id="reportStart"> <input type="date" id="reportEnd">
                    <button class="btn-main" style="width: auto; padding: 14px 20px;" onclick="updateBossStats()">ОК</button>
                </div>
                <div id="bossStats"></div>
            </div>
            <div class="card" style="border: 2px dashed var(--pudra-dark); background: #fffcfd;">
                <h3 style="color: var(--pudra-dark);">💾 Резервне копіювання</h3>
                <p style="font-size: 12px; color: #666;">Рекомендується робити копію щонеділі для безпеки ваших даних.</p>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-main" style="background: var(--cash); flex: 1;" onclick="exportDatabase()">📥 Експорт бази (Save)</button>
                    <label class="btn-main" style="background: var(--pudra-soft); color: var(--pudra-dark); flex: 1; text-align: center; cursor: pointer; display: flex; align-items: center; justify-content: center;">
                        📤 Відкат (Restore)
                        <input type="file" id="importFile" hidden onchange="importDatabase(event)">
                    </label>
                </div>
            </div>
        </div>

        <div id="section-staff" class="section hidden">
            <div class="card">
                <h3>Майстри</h3>
                <div style="display:flex; gap:10px;"><input type="text" id="mFirstName" placeholder="Ім'я"><input type="text" id="mLastName" placeholder="Прізвище"></div>
                <input type="text" id="mSpec" placeholder="Спеціалізація">
                <input type="number" id="mRate" placeholder="Зарплата (%)">
                <button class="btn-main" onclick="saveMaster()">Додати</button>
                <div id="staffListRender" style="margin-top:20px;"></div>
            </div>
        </div>

        <div id="section-price" class="section hidden">
            <div class="card"><h3>Прайс</h3><button class="btn-main" style="background:var(--cash);" onclick="resetAndImportPrice()">🔄 Оновити прайс</button></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyC7G7e1gPoTeM0OgNlFhT1Gh4yHPbsVDAA", authDomain: "beautysalonapp-a04df.firebaseapp.com", projectId: "beautysalonapp-a04df", storageBucket: "beautysalonapp-a04df.firebasestorage.app", messagingSenderId: "109246653607", appId: "1:109246653607:web:9438a249d83fcdeffaa782" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let masters = [], appointments = [], services = [], userRole = 'guest', currentPayId = null;

    const todayStr = new Date().toISOString().split('T')[0];
    viewDateSelector.value = appDate.value = reportStart.value = reportEnd.value = todayStr;

    window.handleLogin = async () => { try { await signInWithEmailAndPassword(auth, loginEmail.value, loginPass.value); } catch(e) { alert("Помилка"); } };
    window.bypassLogin = () => { userRole='master'; loginScreen.style.display='none'; mainApp.classList.remove('hidden'); loadData(); };
    onAuthStateChanged(auth, user => { if(user) { userRole='admin'; loginScreen.style.display='none'; mainApp.classList.remove('hidden'); document.querySelectorAll('.admin-only').forEach(el=>el.classList.remove('hidden')); loadData(); } });
    window.handleLogout = () => signOut(auth).then(() => location.reload());

    function loadData() {
        onSnapshot(collection(db, "masters"), snap => {
            masters = snap.docs.map(d=>({id:d.id, ...d.data()}));
            renderStaffList(); renderGrid();
            selectMaster.innerHTML = masters.map(m=>`<option value="${m.name}">${m.firstName} ${m.lastName}</option>`).join('');
        });
        onSnapshot(collection(db, "services"), snap => {
            services = snap.docs.map(d=>({id:d.id, ...d.data()}));
            renderServiceCheckboxes();
        });
        onSnapshot(collection(db, "appointments"), snap => {
            appointments = snap.docs.map(d=>({id:d.id, ...d.data()}));
            renderGrid(); if(userRole==='admin') updateBossStats();
        });
    }

    // --- ЕКСПОРТ ТА ІМПОРТ (БЕКАП) ---
    window.exportDatabase = async () => {
        const backup = {
            appointments: appointments,
            masters: masters,
            services: services,
            backupDate: new Date().toISOString()
        };
        const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Pudra_Backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        alert("Копія бази даних успішно завантажена на ваш пристрій! 💾");
    };

    window.importDatabase = async (event) => {
        const file = event.target.files[0];
        if (!file) return;
        if (!confirm("УВАГА! Ця дія видалить поточні дані та замінить їх даними з файлу. Ви впевнені?")) return;

        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const data = JSON.parse(e.target.result);
                const batch = writeBatch(db);

                // Очистка та завантаження appointments
                const appSnap = await getDocs(collection(db, "appointments"));
                appSnap.forEach(d => batch.delete(d.ref));
                data.appointments.forEach(a => {
                    const {id, ...rest} = a;
                    batch.set(doc(collection(db, "appointments")), rest);
                });

                // Аналогічно для майстрів
                const mastSnap = await getDocs(collection(db, "masters"));
                mastSnap.forEach(d => batch.delete(d.ref));
                data.masters.forEach(m => {
                    const {id, ...rest} = m;
                    batch.set(doc(collection(db, "masters")), rest);
                });

                await batch.commit();
                alert("Дані успішно відновлено! Система перезавантажиться.");
                location.reload();
            } catch (err) {
                alert("Помилка при читанні файлу бекапу.");
            }
        };
        reader.readAsText(file);
    };

    // --- ІНШІ ФУНКЦІЇ (БЕЗ ЗМІН) ---
    window.searchClientHistory = () => {
        const phoneRaw = clientPhone.value.replace(/\D/g, '');
        if (phoneRaw.length < 9) { clientHistoryContainer.innerHTML = ""; return; }
        const history = appointments.filter(a => (a.clientPhone || "").replace(/\D/g, '') === phoneRaw && a.status === 'completed').sort((a,b)=>new Date(b.date)-new Date(a.date));
        if (history.length === 0) { clientHistoryContainer.innerHTML = `<div class="history-box">Новий клієнт.</div>`; return; }
        let h = `<div class="history-box"><h4>Історія: ${history[0].clientName}</h4>`;
        history.forEach(x => h += `<div class="history-item"><b>${x.date}</b>: ${x.serviceName} (${x.price}₴) ${x.materials?`<br><i>${x.materials}</i>`:''}</div>`);
        clientHistoryContainer.innerHTML = h + "</div>";
    };

    window.calcMultiService = () => {
        let p=0, d=0; document.querySelectorAll('.srv-cb:checked').forEach(cb=>{p+=Number(cb.dataset.price); d+=Number(cb.dataset.duration);});
        appPrice.value=p; appDuration.value=d; recalcSalaryManual();
    };

    window.recalcSalaryManual = () => {
        const m = masters.find(x=>x.name===selectMaster.value);
        if(m) appMasterSalary.value = (Number(appPrice.value)*(m.rate/100)).toFixed(0);
    };

    window.addAppointment = async () => {
        let sNames = []; document.querySelectorAll('.srv-cb:checked').forEach(cb=>sNames.push(cb.dataset.name));
        await addDoc(collection(db, "appointments"), { clientName:clientName.value, clientPhone:clientPhone.value, serviceName:sNames.join(', '), materials:appMaterials.value, date:appDate.value, time:appTime.value, duration:Number(appDuration.value), masterId:selectMaster.value, price:Number(appPrice.value), masterSalary:Number(appMasterSalary.value), status:'pending' });
        showSection('cal');
    };

    window.renderGrid = () => {
        const sD = viewDateSelector.value;
        const grid = document.getElementById('mainGrid');
        grid.style.gridTemplateColumns = `65px repeat(${masters.length}, 1fr)`;
        let h = '<div class="grid-cell header-cell">🌸</div>';
        masters.forEach(m => h += `<div class="grid-cell header-cell"><b>${m.firstName}</b><small>${m.spec}</small></div>`);
        for (let i = 9; i <= 18; i++) {
            const h0=i.toString().padStart(2,'0')+":00", h3=i.toString().padStart(2,'0')+":30";
            h += `<div class="grid-cell time-cell" style="height:100px">${h0}</div>`;
            masters.forEach(m => {
                h += `<div class="grid-cell" style="height:100px">`;
                [h0,h3].forEach(t => {
                    const b = appointments.find(a=>a.masterId===m.name && a.date===sD && isTimeInSession(a.time, a.duration, t));
                    if(b && b.time===t) {
                        const paid = b.status==='completed';
                        h += `<div class="slot"><div class="booked ${paid?'paid':''}">
                            ${userRole==='admin'&&!paid?`<button class="del-x" onclick="deleteApp('${b.id}')">&times;</button>`:''}
                            <b>${b.clientName}</b><div style="font-size:9px">${b.serviceName}</div>
                            <div class="app-controls"><a href="viber://chat?number=${b.clientPhone}" class="btn-action btn-viber">Viber</a>
                            ${userRole==='admin'&&!paid?`<button class="btn-action" style="background:var(--cash)" onclick="openPayment('${b.id}')">Оплата</button>`:''}
                        </div></div></div>`;
                    } else h += `<div class="slot"></div>`;
                });
                h += `</div>`;
            });
        }
        grid.innerHTML = h;
    };

    window.updateBossStats = () => {
        const apps = appointments.filter(a=>a.date>=reportStart.value && a.date<=reportEnd.value && a.status==='completed');
        let t=0, c=0, card=0, sal=0; let mSal={};
        apps.forEach(a=>{
            t+=a.price; if(a.paymentType==='Готівка') c+=a.price; else card+=a.price;
            let pay = a.masterSalary || 0; sal += pay;
            if(!mSal[a.masterId]) mSal[a.masterId]=0; mSal[a.masterId]+=pay;
        });
        let res = `<div class="stat-box">Каса: <span class="stat-val">${t} ₴</span></div>`;
        for(let n in mSal) res += `<div class="master-salary-row"><span>${n}</span><b>${mSal[n].toFixed(0)} ₴</b></div>`;
        bossStats.innerHTML = res + `<div class="stat-box" style="margin-top:10px; background:#fff0f3">Прибуток: <span class="stat-val">${(t-sal).toFixed(0)} ₴</span></div>`;
    };

    window.openPayment = (id) => { currentPayId=id; paymentInfo.innerText = appointments.find(x=>x.id===id).price+" ₴"; paymentModal.style.display='flex'; };
    window.confirmPayment = async (type) => { await updateDoc(doc(db, "appointments", currentPayId), { status:'completed', paymentType:type }); paymentModal.style.display='none'; };
    window.deleteApp = async id => { if(confirm("Видалити?")) await deleteDoc(doc(db,"appointments",id)); };
    window.saveMaster = async () => { await addDoc(collection(db,"masters"), {firstName:mFirstName.value, lastName:mLastName.value, rate:mRate.value, spec:mSpec.value, name:mFirstName.value+" "+mLastName.value}); };
    window.renderStaffList = () => staffListRender.innerHTML = masters.map(m=>`<div class="card" style="display:flex; justify-content:space-between"><b>${m.name}</b><button onclick="deleteDoc(doc(db,'masters','${m.id}'))">🗑</button></div>`).join('');
    window.renderServiceCheckboxes = () => {
        let html = ''; services.forEach(s=> html += `<label class="srv-label"><input type="checkbox" class="srv-cb" value="${s.id}" data-name="${s.name}" data-price="${s.price}" data-duration="${s.duration}" onchange="calcMultiService()"> ${s.name} (${s.price}₴)</label>`);
        serviceCheckboxes.innerHTML = html;
    };
    function isTimeInSession(sT, sD, cT) { const [h1, m1]=sT.split(':').map(Number); const [h2, m2]=cT.split(':').map(Number); const start=h1*60+m1; const check=h2*60+m2; return check>=start && check<(start+sD); }
    window.showSection = n => { document.querySelectorAll('.section').forEach(s=>s.classList.add('hidden')); document.getElementById('section-'+n).classList.remove('hidden'); document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active')); document.getElementById('btn-'+n).classList.add('active'); if(n==='cal') renderGrid(); };
</script>
</body>
</html>
